# Data Platform Core - Minimal Start

name: opendataworld

services:

  # PostgreSQL
  postgres:
    image: postgres:15-alpine
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-admin}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-changeme}
      POSTGRES_DB: ${POSTGRES_DB:-dataplatform}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-admin}"]
      interval: 10s
      timeout: 5s
      retries: 5

  # Redis
  redis:
    image: redis:7-alpine
    ports:
      - "${REDIS_PORT:-6379}:6379"
    command: redis-server --requirepass ${REDIS_PASSWORD:-changeme}
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  # Orchestrator (Agent + MCP + Chat)
  orchestrator:
    build:
      context: ./orchestrator
      dockerfile: Dockerfile
    ports:
      - "${ORCHESTRATOR_PORT:-8000}:8000"
    environment:
      - POSTGRES_URL=postgresql://${POSTGRES_USER:-admin}:${POSTGRES_PASSWORD:-changeme}@postgres:5432/${POSTGRES_DB:-dataplatform}
      - REDIS_URL=redis://:${REDIS_PASSWORD:-changeme}@redis:6379
      - LLM_MODEL=${LLM_MODEL:-llama3}
      - OLLAMA_URL=${OLLAMA_URL:-http://ollama:11434}
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    volumes:
      - ./orchestrator:/app

  # LangFlow
  langflow:
    image: langflowai/langflow:latest
    ports:
      - "${LANGFLOW_PORT:-7860}:7860"
    environment:
      - DATABASE_URL=postgresql://${POSTGRES_USER:-admin}:${POSTGRES_PASSWORD:-changeme}@postgres:5432/langflow
      - LANGFLOW_SECRET_KEY=${LANGFLOW_SECRET_KEY:-changeme}
      - LANGFLOW_LOAD_EXAMPLES=true
    depends_on:
      postgres:
        condition: service_healthy
    volumes:
      - langflow_data:/app/langflow

  # Documentation
  docs:
    image: nginx:alpine
    ports:
      - "${DOCS_PORT:-8001}:80"
    volumes:
      - ./docs:/usr/share/nginx/html:ro

volumes:
  postgres_data:
  redis_data:
  langflow_data:

networks:
  default:
    name: opendataworld
