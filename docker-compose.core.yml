services:
  postgres:
    image: postgres:16
    environment:
      POSTGRES_USER: admin
      POSTGRES_PASSWORD: changeme
      POSTGRES_DB: platform
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data

  surrealdb:
    image: surrealdb/surrealdb:latest
    ports:
      - "8001:8000"
    environment:
      - SURREAL_USER=root
      - SURREAL_PASS=root
    command: start --user root --pass root

  orchestrator:
    build: ./orchestrator
    image: ghcr.io/opendataworld/orchestrator:latest
    ports:
      - "8000:8000"
    depends_on:
      - postgres
      - redis
    environment:
      - DATABASE_URL=postgresql://admin:changeme@postgres:5432/platform
      - REDIS_URL=redis://redis:6379/0

  langflow:
    image: langflowai/langflow:latest
    ports:
      - "7860:7860"
    volumes:
      - ./orchestrator/langflow_components:/app/langflow_components
      - langflow_data:/app/langflow
    environment:
      - DATABASE_URL=postgresql://admin:changeme@postgres:5432/langflow
      - LANGFLOW_SECRET_KEY=changeme
      - LANGFLOW_LOAD_EXAMPLES=false
      - LANGFLOW_COMPONENTS_PATH=/app/langflow_components

volumes:
  postgres_data:
  redis_data:
  langflow_data:

networks:
  default:
    name: opendataworld
