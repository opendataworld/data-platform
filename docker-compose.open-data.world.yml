# Docker Compose override for open-data.world domain
# Copy this to docker-compose.override.yml to apply

version: '3.8'

services:
  # Main API with Traefik labels
  orchestrator:
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.orchestrator.rule=Host(`api.open-data.world`)"
      - "traefik.http.routers.orchestrator.entrypoints=https"
      - "traefik.http.routers.orchestrator.tls=true"
      - "traefik.http.services.orchestrator.loadbalancer.server.port=8000"

  # Lagoon Billing
  lago:
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.lago.rule=Host(`billing.open-data.world`)"
