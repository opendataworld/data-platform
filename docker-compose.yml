# opendataworld data-platform — scaffold.
# Each service is guarded by a Compose profile. Nothing starts unless you opt in.
# See docs/phase-plan.md for the recommended install order.

name: opendataworld

services:

  # ─── sso ──────────────────────────────────────────────────────────────────────
  oauth2-proxy:
    profiles: ["sso"]
    image: oauth2-proxy/oauth2-proxy:latest
    ports:
      - "${OAUTH2_PROXY_PORT}:4180"
    environment:
      OAUTH2_PROXY_PROVIDER: keycloak
      OAUTH2_PROXY_OIDC_ISSUER_URL: ${KEYCLOAK_ISSUER_URL}
      OAUTH2_PROXY_CLIENT_ID: ${OAUTH2_PROXY_CLIENT_ID}
      OAUTH2_PROXY_CLIENT_SECRET: ${OAUTH2_PROXY_CLIENT_SECRET}
      OAUTH2_PROXY_COOKIE_SECRET: ${OAUTH2_PROXY_COOKIE_SECRET}
      OAUTH2_PROXY_REDIRECT_URL: ${OAUTH2_PROXY_REDIRECT_URL}
      OAUTH2_PROXY_EMAIL_domains: "*"
      OAUTH2_PROXY_UPSTREAM: "file://./"
      OAUTH2_PROXY_PASSAuthorizationHeader: "true"
    # TODO: configure routes to each backend service

  # ─── catalog ─────────────────────────────────────────────────────────────────
  openmetadata:
    profiles: ["catalog"]
    image: openmetadata/server:latest
    ports:
      - "${OPENMETADATA_PORT}:8585"
    environment:
      AUTHENTICATION_PROVIDER: custom-oidc
      AUTHENTICATION_PUBLIC_KEYS: "[${KEYCLOAK_ISSUER_URL}/protocol/openid-connect/certs]"
      AUTHENTICATION_AUTHORITY: ${KEYCLOAK_ISSUER_URL}
      AUTHENTICATION_CLIENT_ID: ${OPENMETADATA_OIDC_CLIENT_ID}
      # Email / notifications
      SMTP_HOST: ${SMTP_HOST}
      SMTP_PORT: ${SMTP_PORT}
      SMTP_USER: ${SMTP_USER}
      SMTP_PASSWORD: ${SMTP_PASS}
      SMTP_SENDER: ${SMTP_FROM}
      # TODO: add MySQL + Elasticsearch deps when installing this profile

  # ─── ingest ──────────────────────────────────────────────────────────────────
  airbyte:
    profiles: ["ingest"]
    image: airbyte/server:latest
    ports:
      - "${AIRBYTE_WEBAPP_PORT}:8000"
    environment:
      OIDC_ISSUER: ${KEYCLOAK_ISSUER_URL}
      OIDC_CLIENT_ID: ${AIRBYTE_OIDC_CLIENT_ID}
      OIDC_CLIENT_SECRET: ${AIRBYTE_OIDC_CLIENT_SECRET}
    # TODO: Airbyte needs temporal, db, worker, webapp — expand on install

  # ─── crawl ───────────────────────────────────────────────────────────────────
  firecrawl:
    profiles: ["ingest", "crawl"]
    image: firecrawlai/firecrawl:latest
    ports:
      - "${FIRECRAWL_PORT}:3002"
    environment:
      FIRECRAWL_API_KEY: ${FIRECRAWL_API_KEY}
      LOG_LEVEL: ${LOG_LEVEL:-info}
    # TODO: add Redis and Postgres deps for production

  crawl4ai:
    profiles: ["ingest", "crawl"]
    image: nightly:latest
    ports:
      - "${CRAWL4AI_PORT}:8000"
    environment:
      CRAWL4AI_REDIS_URL: ${CRAWL4AI_REDIS_URL:-redis://redis:6379}
      CRAWL4AI_DB_URL: ${CRAWL4AI_DB_URL:-postgresql://postgres:postgres@postgres:5432/crawl4ai}
      CRAWL4AI_API_TOKEN: ${CRAWL4AI_API_TOKEN}
    depends_on:
      - postgres
      - redis

  redis:
    profiles: ["crawl"]
    image: redis:7-alpine
    ports:
      - "${REDIS_PORT}:6379"
    volumes:
      - redis-data:/data

  # ─── label ────────────────────────────────────────────────────────────────────
  labelstudio:
    profiles: ["label"]
    image: heartexlabs/label-studio:latest
    ports:
      - "${LABELSTUDIO_PORT}:9090"
    environment:
      LABEL_STUDIO_USERNAME: admin
      LABEL_STUDIO_PASSWORD: ${LABELSTUDIO_PASSWORD}
      LABEL_STUDIO_SECRET_KEY: ${LABELSTUDIO_SECRET_KEY}
      LABEL_STUDIO_LOCAL_FILES_SERVING_ENABLED: "true"
      LABEL_STUDIO_LOCAL_FILES_DOCUMENT_ROOT: /label-studio/data
    volumes:
      - labelstudio-data:/label-studio/data

  # ─── feedback / annotations ─────────────────────────────────────────────────
  argilla:
    profiles: ["label", "feedback"]
    image: argilla/argilla:latest
    ports:
      - "${ARGILLA_PORT}:6900"
    environment:
      ARGILLA_API_KEY: ${ARGILLA_API_KEY}
      ARGILLA_ADMIN_PASSWORD: ${ARGILLA_ADMIN_PASSWORD}
      ARGILLA_LOCAL: "true"
      ARGILLA_DATABASE: "sqlite:///argilla.db"
    volumes:
      - argilla-data:/var/lib/argilla

  # ─── test / automation ──────────────────────────────────────────────────────
  playwright:
    profiles: ["test", "crawl"]
    image: mcr.microsoft.com/playwright:latest
    ports:
      - "${PLAYWRIGHT_PORT}:8080"
    environment:
      PLAYWRIGHT_SKIP_BROWSER_DOWNLOAD: "0"
      PLAYWRIGHT_BROWSERS_PATH: /ms-playwright
    volumes:
      - playwright-data:/ms-playwright
    # Use for e2e testing and web automation

  # ─── resolve ─────────────────────────────────────────────────────────────────
  zingg:
    profiles: ["resolve"]
    image: zingg/zingg:latest
    environment:
      SPARK_DRIVER_MEMORY: ${ZINGG_SPARK_MEMORY}
    # Zingg is batch: run `docker compose run --rm zingg train ...`

  # ─── semantic ────────────────────────────────────────────────────────────────
  cube:
    profiles: ["semantic"]
    image: cubejs/cube:latest
    ports:
      - "${CUBE_API_PORT}:4000"
    environment:
      CUBEJS_JWK_URL: ${CUBE_JWT_JWKS_URL}
      CUBEJS_JWT_ISSUER: ${KEYCLOAK_ISSUER_URL}

  # ─── viz ─────────────────────────────────────────────────────────────────────
  superset:
    profiles: ["viz"]
    image: apache/superset:latest
    ports:
      - "${SUPERSET_PORT}:8088"
    environment:
      SUPERSET_SECRET_KEY: ${SUPERSET_SECRET_KEY}
      # Email / notifications
      SMTP_HOST: ${SMTP_HOST}
      SMTP_PORT: ${SMTP_PORT}
      SMTP_USER: ${SMTP_USER}
      SMTP_PASSWORD: ${SMTP_PASS}
      SMTP_FROM: ${SMTP_FROM}
      # TODO: mount superset_config.py with OIDC client via AUTH_OAUTH

  # ─── cdp ─────────────────────────────────────────────────────────────────────
  unomi:
    profiles: ["cdp"]
    image: apache/unomi:latest
    ports:
      - "${UNOMI_PORT}:8181"
    environment:
      # Email / notifications
      MAIL_SMTP_HOST: ${SMTP_HOST}
      MAIL_SMTP_PORT: ${SMTP_PORT}
      MAIL_SMTP_USER: ${SMTP_USER}
      MAIL_SMTP_PASSWORD: ${SMTP_PASS}
      MAIL_FROM: ${SMTP_FROM}
    # TODO: front with oauth2-proxy for Keycloak SSO; add Elasticsearch dep

  # ─── store ───────────────────────────────────────────────────────────────────
  postgres:
    profiles: ["store"]
    image: postgres:16
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    ports:
      - "${POSTGRES_PORT}:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data

  surrealdb:
    profiles: ["store"]
    image: surrealdb/surrealdb:latest
    command: start --user ${SURREALDB_USER} --pass ${SURREALDB_PASS}
    ports:
      - "${SURREALDB_PORT}:8000"
    volumes:
      - surrealdb-data:/data

  # ─── kg-edit ─────────────────────────────────────────────────────────────────
  terminusdb:
    profiles: ["kg-edit"]
    image: terminusdb/terminusdb-server:latest
    environment:
      TERMINUSDB_ADMIN_PASS: ${TERMINUSDB_ADMIN_PASS}
    ports:
      - "${TERMINUSDB_PORT}:6363"
    volumes:
      - terminusdb-storage:/app/terminusdb/storage

  # ─── kg-pub ──────────────────────────────────────────────────────────────────
  graphdb:
    profiles: ["kg-pub"]
    image: ontotext/graphdb:10.6.4
    ports:
      - "${GRAPHDB_PORT}:7200"
    volumes:
      - graphdb-data:/opt/graphdb/home

  # ─── schema / linked data ───────────────────────────────────────────────────
  jena:
    profiles: ["kg-edit", "kg-pub"]
    image: apache/jena:latest
    ports:
      - "${JENA_PORT}:3030"
    environment:
      JENA_ADMIN_PASSWORD: ${JENA_ADMIN_PASSWORD}
    volumes:
      - jena-data:/var/lib/jena
    # RDF/Schema.org processing and SPARQL queries

  # ─── classification / taxonomy ──────────────────────────────────────────────
  iab-taxonomy:
    profiles: ["crawl", "ingest"]
    image: python:3.11-slim
    command: >
      bash -c "pip install iab-taxonomy && python -c \"from iab_taxonomy import load_taxonomy; t = load_taxonomy(); print('IAB Taxonomy loaded:', len(t), 'categories')\""
    environment:
      PYTHONUNBUFFERED: "1"
    # Loads IAB Content Taxonomy for classification

  # ─── reviews / comparison ───────────────────────────────────────────────────
  g2-api:
    profiles: ["ingest", "crawl"]
    image: python:3.11-slim
    command: >
      bash -c "pip install requests && python -c \"print('G2 API client ready - configure G2_API_KEY in .env')\""
    environment:
      G2_API_KEY: ${G2_API_KEY}
      PYTHONUNBUFFERED: "1"
    # G2 API client for software reviews and comparison data

  # ─── search ───────────────────────────────────────────────────────────────────
  searxng:
    profiles: ["search", "crawl"]
    image: searxng/searxng:latest
    ports:
      - "${SEARXNG_PORT}:8080"
    environment:
      SEARXNG_BASE_URL: "https://platform.open-data.world"
      SEARXNG_SECRET: ${SEARXNG_SECRET}
    volumes:
      - searxng-data:/etc/searxng
    # Privacy-respecting meta search engine

  # ─── SEO / analytics ────────────────────────────────────────────────────────
  google-search-console:
    profiles: ["search", "ingest"]
    image: python:3.11-slim
    command: >
      bash -c "pip install google-api-python-client google-auth-oauthlib && python -c \"print('Google Search Console API client ready - configure GOOGLE_SEARCH_CONSOLE_* in .env')\""
    environment:
      GOOGLE_SEARCH_CONSOLE_SERVICE_ACCOUNT: ${GOOGLE_SEARCH_CONSOLE_SERVICE_ACCOUNT}
      GOOGLE_SEARCH_CONSOLE_PROPERTY_URL: ${GOOGLE_SEARCH_CONSOLE_PROPERTY_URL}
      PYTHONUNBUFFERED: "1"
    volumes:
      - gsc-data:/data
    # Google Search Console API for SEO analytics

  # ─── maps / geocoding ───────────────────────────────────────────────────────
  maps:
    profiles: ["crawl", "ingest"]
    image: python:3.11-slim
    command: >
      bash -c "pip install mapbox libphonenumber geopy shapely plus-codes && python -c \"print('Maps/Geocoding + Plus Codes client ready')\""
    environment:
      MAPBOX_ACCESS_TOKEN: ${MAPBOX_ACCESS_TOKEN}
      GOOGLE_MAPS_API_KEY: ${GOOGLE_MAPS_API_KEY}
      PYTHONUNBUFFERED: "1"
    volumes:
      - maps-data:/data
    # Maps, geocoding, and location services (Mapbox, Google Maps, OpenStreetMap, Plus Codes)

  # ─── knowledge bases ────────────────────────────────────────────────────────
  wikidata:
    profiles: ["crawl", "kg-pub"]
    image: python:3.11-slim
    command: >
      bash -c "pip install wikidata wikipedia-api rdflib && python -c \"print('Wikidata client ready - SPARQL endpoint: https://query.wikidata.org')\""
    environment:
      WIKIDATA_API_URL: "https://www.wikidata.org/wiki/Special:EntityData"
      WIKIDATA_SPARQL_URL: "https://query.wikidata.org/sparql"
      PYTHONUNBUFFERED: "1"
    volumes:
      - wikidata-cache:/data
    # Wikidata API and SPARQL endpoint for structured knowledge

  wikipedia-topics:
    profiles: ["crawl", "kg-pub"]
    image: python:3.11-slim
    command: >
      bash -c "pip install wikipedia-api beautifulsoup4 spacy && python -c \"print('Wikipedia topics client ready')\""
    environment:
      WIKIPEDIA_API_LANG: "en"
      PYTHONUNBUFFERED: "1"
    volumes:
      - wikipedia-cache:/data
    # Wikipedia API for topic extraction and article processing

  # ─── product data ────────────────────────────────────────────────────────────
  google-product-taxonomy:
    profiles: ["crawl", "ingest", "store"]
    image: python:3.11-slim
    command: >
      bash -c "pip install requests google-taxonomy && python -c \"from google_taxonomy import get_taxonomy; print('Google Product Taxonomy loaded:', len(get_taxonomy()), 'categories')\""
    environment:
      PYTHONUNBUFFERED: "1"
    volumes:
      - google-taxonomy-data:/data
    # Google Product Taxonomy for e-commerce categorization

  # ─── NLP ─────────────────────────────────────────────────────────────────────
  opennlp:
    profiles: ["crawl", "ingest"]
    image: apache/opennlp:latest
    ports:
      - "${OPENNLP_PORT}:8080"
    environment:
      JAVA_OPTS: "-Xmx2g"
    volumes:
      - opennlp-models:/models
    # Apache OpenNLP for sentence detection, tokenization, NER, POS

  # ─── ML / AI ────────────────────────────────────────────────────────────────
  tensorflow:
    profiles: ["ml", "ingest"]
    image: tensorflow/serving:latest
    ports:
      - "${TENSORFLOW_PORT}:8501"
    environment:
      TENSORFLOW_MODEL_NAME: ${TENSORFLOW_MODEL_NAME:-model}
    volumes:
      - tensorflow-models:/models
    # TensorFlow Serving for model inference

  ultralytics-yolo:
    profiles: ["ml", "ingest"]
    image: ultralytics/ultralytics:latest
    ports:
      - "${YOLO_PORT}:8000"
    environment:
      YOLO_MODEL: ${YOLO_MODEL:-yolov8n.pt}
      YOLO_DEVICE: ${YOLO_DEVICE:-cpu}
    volumes:
      - yolo-models:/models
    # Ultralytics YOLO for object detection, segmentation, classification

  opencv:
    profiles: ["ml", "crawl"]
    image: python:3.11-slim
    command: >
      bash -c "pip install opencv-python-headless pillow numpy && python -c \"import cv2; print('OpenCV version:', cv2.__version__)\""
    environment:
      PYTHONUNBUFFERED: "1"
    volumes:
      - opencv-cache:/data
    # OpenCV for image processing, computer vision, filtering

  # ─── OCR ─────────────────────────────────────────────────────────────────────
  tesseract:
    profiles: ["ml", "crawl"]
    image: tesseract/tesseract:latest
    ports:
      - "${TESSERACT_PORT}:8080"
    environment:
      TESSERACT_LANG: ${TESSERACT_LANG:-eng}
    volumes:
      - tesseract-data:/data
    # Tesseract OCR for image-to-text

  easyocr:
    profiles: ["ml", "crawl"]
    image: python:3.11-slim
    command: >
      bash -c "pip install easyocr torch torchvision && python -c \"import easyocr; print('EasyOCR ready')\""
    environment:
      PYTHONUNBUFFERED: "1"
    volumes:
      - easyocr-cache:/data
    # EasyOCR for multilingual text recognition

  paddleocr:
    profiles: ["ml", "crawl"]
    image: python:3.11-slim
    command: >
      bash -c "pip install paddlepaddle paddleocr && python -c \"from paddleocr import PaddleOCR; print('PaddleOCR ready')\""
    environment:
      PYTHONUNBUFFERED: "1"
    volumes:
      - paddleocr-cache:/data
    # PaddleOCR for efficient text recognition

  # ─── Image to Video ────────────────────────────────────────────────────────
  modelscope-t2v:
    profiles: ["ml", "ingest"]
    image: python:3.11-slim
    command: >
      bash -c "pip install modelscope ms-swift torch && python -c \"print('ModelScope T2V ready')\""
    environment:
      PYTHONUNBUFFERED: "1"
    volumes:
      - modelscope-cache:/data
    # ModelScope text-to-video generation

  zeroscope:
    profiles: ["ml", "ingest"]
    image: python:3.11-slim
    command: >
      bash -c "pip install diffusers transformers accelerate torch && python -c \"print('ZeroScope ready - configure model path')\""
    environment:
      PYTHONUNBUFFERED: "1"
    volumes:
      - zeroscope-cache:/data
    # ZeroScope for image-to-video generation

  animate-anything:
    profiles: ["ml", "ingest"]
    image: python:3.11-slim
    command: >
      bash -c "pip install animate-anything torch && python -c \"print('AnimateAnything ready')\""
    environment:
      PYTHONUNBUFFERED: "1"
    volumes:
      - animate-anything-cache:/data
    # AnimateAnything for video generation from images

  # ─── Speech to Text ────────────────────────────────────────────────────────
  whisper:
    profiles: ["ml", "ingest"]
    image: python:3.11-slim
    command: >
      bash -c "pip install whisper torch && python -c \"import whisper; print('Whisper ready')\""
    environment:
      WHISPER_MODEL: ${WHISPER_MODEL:-base}
      PYTHONUNBUFFERED: "1"
    volumes:
      - whisper-cache:/data
    # OpenAI Whisper for speech-to-text

  faster-whisper:
    profiles: ["ml", "ingest"]
    image: python:3.11-slim
    command: >
      bash -c "pip install faster-whisper torch && python -c \"from faster_whisper import WhisperModel; print('Faster Whisper ready')\""
    environment:
      PYTHONUNBUFFERED: "1"
    volumes:
      - faster-whisper-cache:/data
    # Faster Whisper with CTranslate2 for faster inference

  coqui-stt:
    profiles: ["ml", "ingest"]
    image: coqui/ai-shell:latest
    ports:
      - "${COQUI_STT_PORT}:5002"
    environment:
      PYTHONUNBUFFERED: "1"
    volumes:
      - coqui-cache:/data
    # Coqui STT for open-source speech-to-text

  # ─── LLMs ──────────────────────────────────────────────────────────────────
  ollama:
    profiles: ["ml", "ingest"]
    image: ollama/ollama:latest
    ports:
      - "${OLLAMA_PORT}:11434"
    volumes:
      - ollama-models:/root/.ollama
    # Ollama for running local LLMs (Llama, Mistral, etc.)

  gpt4all:
    profiles: ["ml", "ingest"]
    image: python:3.11-slim
    command: >
      bash -c "pip install gpt4all torch && python -c \"from gpt4all import GPT4All; print('GPT4All ready')\""
    environment:
      PYTHONUNBUFFERED: "1"
    volumes:
      - gpt4all-cache:/data
    # GPT4All for local LLM inference

  text-generation-webui:
    profiles: ["ml", "ingest"]
    image: ghcr.io/oobabooga/text-generation-webui:latest
    ports:
      - "${TEXTGEN_WEBUI_PORT}:7860"
    environment:
      PYTHONUNBUFFERED: "1"
    volumes:
      - textgen-models:/models
    # Text Generation WebUI for various LLM models

  # ─── Structured Data LLMs ─────────────────────────────────────────────────
  json-agent:
    profiles: ["ml", "ingest"]
    image: python:3.11-slim
    command: >
      bash -c "pip install jsonformer jsonmode langchain && python -c \"print('JSON agent ready')\""
    environment:
      PYTHONUNBUFFERED: "1"
    volumes:
      - json-agent-data:/data
    # JSONFormer for structured JSON generation from LLMs

  structify:
    profiles: ["ml", "ingest"]
    image: python:3.11-slim
    command: >
      bash -c "pip install pydantic langchain openai && python -c \"from pydantic import BaseModel; print('Structify ready')\""
    environment:
      PYTHONUNBUFFERED: "1"
    volumes:
      - structify-data:/data
    # Pydantic/structify for schema-guided LLM output

  guidance:
    profiles: ["ml", "ingest"]
    image: python:3.11-slim
    command: >
      bash -c "pip install guidance lm-format-enforcer && python -c \"import guidance; print('Guidance ready')\""
    environment:
      PYTHONUNBUFFERED: "1"
    volumes:
      - guidance-data:/data
    # Microsoft Guidance for constrained generation

  outlines:
    profiles: ["ml", "ingest"]
    image: python:3.11-slim
    command: >
      bash -c "pip install outlines transformers && python -c \"import outlines; print('Outlines ready')\""
    environment:
      PYTHONUNBUFFERED: "1"
    volumes:
      - outlines-data:/data
    # Outlines for structured generation with grammars

  jsonformer:
    profiles: ["ml", "ingest"]
    image: python:3.11-slim
    command: >
      bash -c "pip install jsonformer torch && python -c \"from jsonformer import Jsonformer; print('JSONFormer ready')\""
    environment:
      PYTHONUNBUFFERED: "1"
    volumes:
      - jsonformer-data:/data
    # JSONFormer for constrained JSON generation

  # ─── Media Taxonomies ──────────────────────────────────────────────────────
  iptc-media-topics:
    profiles: ["crawl", "ingest", "store"]
    image: python:3.11-slim
    command: >
      bash -c "pip install iptcinfo3 newsyaml && python -c \"from iptcinfo3 import IPTCInfo; print('IPTC Media Topics ready')\""
    environment:
      PYTHONUNBUFFERED: "1"
    volumes:
      - iptc-data:/data
    # IPTC Media Topics for news/media taxonomy classification

  # ─── Workflow Orchestration ────────────────────────────────────────────────
  temporal:
    profiles: ["ml", "ingest", "crawl"]
    image: temporalio/auto-setup:latest
    ports:
      - "${TEMPORAL_PORT}:7233"
    environment:
      TEMPORAL_ADDRESS: temporal:7233
      DB: postgresql
      DB_PORT: 5432
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PWD: ${POSTGRES_PASSWORD}
      POSTGRES_SEEDS: postgres
    depends_on:
      - postgres
    # Temporal.io workflow orchestration for ML pipelines

  # ─── Clustering / Unsupervised ML ─────────────────────────────────────────
  clustering:
    profiles: ["ml", "ingest"]
    image: python:3.11-slim
    command: >
      bash -c "pip install scikit-learn pandas numpy hdbscan kneed && python -c \"from sklearn.cluster import KMeans; print('Clustering libs ready')\""
    environment:
      PYTHONUNBUFFERED: "1"
    volumes:
      - clustering-data:/data
    # Clustering: K-Means, DBSCAN, HDBSCAN, hierarchical clustering

  pyclustering:
    profiles: ["ml", "ingest"]
    image: python:3.11-slim
    command: >
      bash -c "pip install pyclustering && python -c \"from pyclustering.cluster import kmeans; print('PyClustering ready')\""
    environment:
      PYTHONUNBUFFERED: "1"
    volumes:
      - pyclustering-data:/data
    # PyClustering for advanced clustering algorithms

  faiss:
    profiles: ["ml", "ingest"]
    image: python:3.11-slim
    command: >
      bash -c "pip install faiss-cpu faiss-gpu && python -c \"import faiss; print('FAISS ready - vector similarity search')\""
    environment:
      PYTHONUNBUFFERED: "1"
    volumes:
      - faiss-data:/data
    # Facebook AI Similarity Search for vector clustering

  annoy:
    profiles: ["ml", "ingest"]
    image: python:3.11-slim
    command: >
      bash -c "pip install annoy && python -c \"import annoy; print('Annoy ready - approximate nearest neighbors')\""
    environment:
      PYTHONUNBUFFERED: "1"
    volumes:
      - annoy-data:/data
    # Annoy for approximate nearest neighbor clustering

  hnswlib:
    profiles: ["ml", "ingest"]
    image: python:3.11-slim
    command: >
      bash -c "pip install hnswlib && python -c \"import hnswlib; print('HNSWlib ready')\""
    environment:
      PYTHONUNBUFFERED: "1"
    volumes:
      - hnswlib-data:/data
    # HNSWlib for hierarchical navigable small world graphs

  # ─── Embedding Models for Clustering ───────────────────────────────────────
  sentence-transformers:
    profiles: ["ml", "ingest"]
    image: python:3.11-slim
    command: >
      bash -c "pip install sentence-transformers torch && python -c \"from sentence_transformers import SentenceTransformer; print('Sentence Transformers ready')\""
    environment:
      SENTENCE_TRANSFORMERS_MODEL: ${SENTENCE_TRANSFORMERS_MODEL:-all-MiniLM-L6-v2}
      PYTHONUNBUFFERED: "1"
    volumes:
      - sentence-transformers-cache:/data
    # Sentence transformers for embedding-based clustering

  flair:
    profiles: ["ml", "ingest"]
    image: python:3.11-slim
    command: >
