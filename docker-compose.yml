  prefect:
    profiles: ["ingest", "ml"]
    image: prefecthq/prefect:3-latest
    ports:
      - "${PREFECT_PORT}:4200"
    environment:
      PREFECT_HOME: /root/.prefect
    volumes:
      - prefect-data:/root/.prefect
    # Prefect for data workflow automation

  # ─── Data Streaming ────────────────────────────────────────────
  kafka:
    profiles: ["ingest", "ml"]
    image: confluentinc/cp-kafka:latest
    ports:
      - "${KAFKA_PORT}:9092"
    environment:
      KAFKA_BROKER_ID: 1
      KAFKA_ZOOKEEPER_CONNECT: zookeeper:2181
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka:9092
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
    depends_on:
      - zookeeper
    # Apache Kafka for event streaming

  zookeeper:
    profiles: ["ingest", "ml"]
    image: confluentinc/cp-zookeeper:latest
    environment:
      ZOOKEEPER_CLIENT_PORT: 2181
      ZOOKEEPER_TICK_TIME: 2000
    # Zookeeper for Kafka

  redpanda:
    profiles: ["ingest", "ml"]
    image: redpandadata/redpanda:latest
    ports:
      - "${REDPANDA_PORT}:9092"
    command: -v
    # Redpanda (Kafka-compatible) for streaming

  # ─── ETL / Data Virtualization ──────────────────────────────────────────
  apache-pinot:
    profiles: ["ingest", "ml"]
    image: apachepinot/pinot:latest
    ports:
      - "${PINOT_PORT}:9000"
    # Apache Pinot for real-time analytics

  trino:
    profiles: ["ingest", "ml"]
    image: trinodb/trino:latest
    ports:
      - "${TRINO_PORT}:8080"
    environment:
      TRINO_ENV: trino
      DATABASE_URL: postgresql://${POSTGRES_USER}:${POSTGRES_PASSWORD}@postgres:5432
    # Trino for distributed SQL query engine

  duckdb:
    profiles: ["ingest", "ml"]
    image: python:3.11-slim
    command: >
      bash -c "pip install duckdb duckdb-client && python -c \"import duckdb; print('DuckDB ready')\""
    environment:
      PYTHONUNBUFFERED: "1"
    volumes:
      - duckdb-data:/data
    # DuckDB for embedded analytics

  clickhouse:
    profiles: ["ingest", "ml"]
    image: clickhouse/clickhouse-server:latest
    ports:
      - "${CLICKHOUSE_PORT}:8123"
    volumes:
      - clickhouse-data:/var/lib/clickhouse
    # ClickHouse for OLAP analytics

  # ─── Data Replication / CDC ─────────────────────────────────────
  debezium:
    profiles: ["ingest", "ml"]
    image: debezium/connect:latest
    ports:
      - "${DEBEZIUM_PORT}:8083"
    environment:
      BOOTSTRAP_SERVERS: kafka:9092
      GROUP_ID: debezium-group
      CONFIG_STORAGE_TOPIC: debezium_configs
      OFFSET_STORAGE_TOPIC: debezium_offsets
      STATUS_STORAGE_TOPIC: debezium_statuses
    depends_on:
      - kafka
    # Debezium for change data capture

  airbyte:
    profiles: ["ingest", "ml"]
    image: airbyte/normalization:latest
    ports:
      - "${AIRBYTE_PORT}:8000"
    environment:
      AIRBYTE_DATABASE_URL: postgresql://${POSTGRES_USER}:${POSTGRES_PASSWORD}@postgres:5432/airbyte
    volumes:
      - airbyte-data:/data
    # Airbyte for data integration / CDC

  meltano:
    profiles: ["ingest", "ml"]
    image: python:3.11-slim
    command: >
      bash -c "pip install meltano && python -c \"import meltano; print('Meltano ready')\""
    environment:
      PYTHONUNBUFFERED: "1"
    volumes:
      - meltano-data:/data
    # Meltano for ELT pipelines

  # ─── Data Masking / Anonymization ─────────────────────────────────
  presidio-analyzer:
    profiles: ["ingest", "crawl", "ml"]
    image: python:3.11-slim
    command: >
      bash -c "pip install presidio-analyzer presidio-anonymizer faker && python -c \"from presidio_analyzer import AnalyzerEngine; print('Presidio ready - PII detection')\""
    environment:
      PYTHONUNBUFFERED: "1"
    volumes:
      - presidio-data:/data
    # Microsoft Presidio for PII detection and anonymization

  # ─── Data Platforms ──────────────────────────────────────────────────
  # (Data Warehouse, Lakehouse - already have postgres, surrealdb, etc above)

  # ─── Data Architecture / catalogs ──────────────────────────────────
  # Data catalogs are already covered by: datahub, amundsen, atlas, collibra, openmetadata

  # ─── Data Engineering ────────────────────────────────────────────
  # Already have: airflow, dagster, prefect, temporal

  # ─── Data Transfer / Movement ────────────────────────────────────────
  rclone:
    profiles: ["ingest", "ml"]
    image: python:3.11-slim
    command: >
      bash -c "pip install rclone && python -c \"import rclone; print('rclone ready')\""
    environment:
      PYTHONUNBUFFERED: "1"
    volumes:
      - rclone-data:/data
    # rclone for data transfer between cloud/storage

  # ─── Data Processing / ETL ─────────────────────────────────────
  # Already have: trino, duckdb, clickhouse, apache-pinot

  # ─── Data Optimization ────────────────────────────────────────────
  data-optimization:
    profiles: ["ingest", "ml"]
    image: python:3.11-slim
    command: >
      bash -c "pip install pyarrow pandas && python -c \"print('Data optimization ready')\""
    environment:
      PYTHONUNBUFFERED: "1"
    volumes:
      - data-optimization-data:/data
    # Data optimization utilities

  # ─── Data Reduction / Compression ────────────────────────────────
  data-reduction:
    profiles: ["ingest", "ml"]
    image: python:3.11-slim
    command: >
      bash -c "pip install lz4 zstandard pyzstd && python -c \"print('Data reduction ready')\""
    environment:
      PYTHONUNBUFFERED: "1"
    volumes:
      - data-reduction-data:/data
    # Data compression/reduction utilities

  # ─── Data Silos / Consolidation ───────────────────────────
  data-consolidation:
    profiles: ["ingest", "ml"]
    image: python:3.11-slim
    command: >
      bash -c "pip install sqlalchemy pandas && python -c \"print('Data consolidation ready')\""
    environment:
      PYTHONUNBUFFERED: "1"
    volumes:
      - data-consolidation-data:/data
    # Tools to break down data silos

  # ─── Data Strategy / Planning ─────────────────────────────────

  # ─── Data Democratization ────────────────────────────────
  data-catalog-democratization:
    profiles: ["catalog", "ingest"]
    image: python:3.11-slim
    command: >
      bash -c "pip install sqlalchemy pandas openmetadata && python -c \"print('Data democratization ready')\""
    environment:
      PYTHONUNBUFFERED: "1"
    volumes:
      - democratization-data:/data
    # Tools for data democratization

  # ─── Data SLA Management ─────────────────────────────────────
  data-sla:
    profiles: ["ingest", "ml"]
    image: python:3.11-slim
    command: >
      bash -c "pip install prometheus-client pandas && python -c \"print('Data SLA ready')\""
    environment:
      PYTHONUNBUFFERED: "1"
    volumes:
      - data-sla-data:/data
    # Data SLA monitoring

  # ─── Data / Big Data ──────────────────────────────────────────────────────
  bigdata-processing:
    profiles: ["ingest", "ml"]
    image: python:3.11-slim
    command: >
      bash -c "pip install pyspark dask distributed && python -c \"import pyspark; print('Big data ready')\""
    environment:
      PYTHONUNBUFFERED: "1"
    volumes:
      - bigdata-data:/data
    # Big data processing (PySpark, Dask)

  # ─── Data Modernization ─────────────────────────────────────────
  data-modernization:
    profiles: ["ingest", "ml"]
    image: python:3.11-slim
    command: >
      bash -c "pip install sqlalchemy migrationbuilder && python -c \"print('Data modernization ready')\""
    environment:
      PYTHONUNBUFFERED: "1"
    volumes:
      - data-modernization-data:/data
    # Data migration and modernization

  # ─── Data Fragmentation ───────────────────────────────────────────
  data-fragmentation:
    profiles: ["ingest", "ml"]
    image: python:3.11-slim
    command: >
      bash -c "pip install pandas networkx && python -c \"print('Data fragmentation analysis ready')\""
    environment:
      PYTHONUNBUFFERED: "1"
    volumes:
      - data-fragmentation-data:/data
    # Analyze and resolve data fragmentation

  # ─── Chief Data Officer (CDO) Tools ─────────────────────────
  cdo-dashboard:
    profiles: ["ingest", "ml"]
    image: python:3.11-slim
    command: >
      bash -c "pip install streamlit pandas plotly && python -c \"print('CDO dashboard ready')\""
    environment:
      PYTHONUNBUFFERED: "1"
    volumes:
      - cdo-data:/data
    ports:
      - "${CDO_PORT}:8501"
    # CDO dashboard for data governance metrics

  lago-data:

  # ─── Billing / Monetization ───────────────────────────────────────────
  lago:
    profiles: ["ingest", "ml"]
    image: getlago/lago-open:latest
    ports:
      - "${LAGO_PORT}:3000"
    environment:
      LAGO_DATABASE_URL: postgresql://${POSTGRES_USER}:${POSTGRES_PASSWORD}@postgres:5432/lago
      LAGO_REDIS_URL: redis://redis:6379
      LAGO_SECRET_KEY_BASE: ${LAGO_SECRET_KEY_BASE:-changeme}
      LAGO_ENCRYPTION_KEY_BASE: ${LAGO_ENCRYPTION_KEY_BASE:-changeme}
      LAGO_INTEGRATION_WEBHOOK_URL: ${LAGO_WEBHOOK_URL}
    depends_on:
      - postgres
      - redis
    # Lago for usage-based billing and metering
  data-strategy:
    profiles: ["ingest", "ml"]
    image: python:3.11-slim
    command: >
      bash -c "pip install networkx pyvis pandas && python -c \"print('Data strategy ready')\""
    environment:
      PYTHONUNBUFFERED: "1"
    volumes:
      - data-strategy-data:/data
    # Data strategy planning tools

  # ─── Data Visibilty / Catalog ───────────────────────────────
  # Already covered: datahub, amundsen, atlas, collibra, openmetadata
    profiles: ["ingest", "ml"]
    image: langflowai/langflow:latest
    ports:
      - "${LANGFLOW_PORT}:7860"
    environment:
      DATABASE_URL: postgresql://${POSTGRES_USER}:${POSTGRES_PASSWORD}@postgres:5432/langflow
      LANGFLOW_ENABLE_STREAMING: "true"
    volumes:
      - langflow-data:/data
    # LangFlow for visual LangChain workflow builder

  n8n:
    profiles: ["ingest", "ml"]
    image: n8nio/n8n:latest
    ports:
      - "${N8N_PORT}:5678"
    environment:
      - N8N_BASIC_AUTH_ACTIVE=true
      - N8N_BASIC_AUTH_USER
      - N8N_BASIC_AUTH_PASSWORD
      - N8N_HOST=0.0.0.0
      - N8N_PORT=5678
      - N8N_PROTOCOL=https
      - WEBHOOK_URL=${N8N_WEBHOOK_URL}
      - GENERIC_TIMEZONE=UTC
    volumes:
      - n8n-data:/home/node/.n8n
    # n8n for workflow automation

  flowise:
    profiles: ["ingest", "ml"]
    image: flowiseai/flowise:latest
    ports:
      - "${FLOWISE_PORT}:3000"
    environment:
      DATABASE_URL: postgresql://${POSTGRES_USER}:${POSTGRES_PASSWORD}@postgres:5432/flowise
      APIKEY_ENV FLOWISE_API_KEY
      SECRETKEY_ENV
    volumes:
      - flowise-data:/root/.flowise
    # Flowise for drag-and-drop LLM flow builder

  promptly:
    profiles: ["ingest", "ml"]
    image: TrumanBorg/promptly-web:latest
    ports:
      - "${PROMPTLY_PORT}:8501"
    environment:
      PYTHONUNBUFFERED: "1"
    volumes:
      - promptly-data:/data
    # Promptly for prompt engineering and testing

  chainlit:
    profiles: ["ingest", "ml"]
    image: ghcr.io/chainlit/chainlit:latest
    ports:
      - "${CHAINLIT_PORT}:8000"
    environment:
      PYTHONUNBUFFERED: "1"
    volumes:
      - chainlit-data:/data
    # Chainlit for building conversational AI interfaces

  transformers-api:
    profiles: ["ml", "ingest"]
    image: huggingface/transformers-pytorch-gpu:latest
    ports:
      - "${HF_API_PORT}:8080"
    environment:
      HF_HOME: /data/huggingface
      PYTHONUNBUFFERED: "1"
    volumes:
      - transformers-api-data:/data
    # HuggingFace Inference API for model serving

