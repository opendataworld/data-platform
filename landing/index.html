<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Open Data World - AI-Powered Data Platform</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <style>
        * { font-family: 'Inter', sans-serif; }
        .hero-gradient { background: linear-gradient(135deg, #0f172a 0%, #1e1b4b 50%, #312e81 100%); }
        .glow { box-shadow: 0 0 60px rgba(99, 102, 241, 0.3); }
    </style>
</head>
<body class="hero-gradient min-h-screen text-white">
    <nav class="fixed w-full z-50 border-b border-white/10 backdrop-blur-md">
        <div class="max-w-6xl mx-auto px-6 py-4 flex justify-between items-center">
            <span class="text-xl font-bold">Open Data World</span>
            <div class="flex gap-6 text-sm">
                <a href="#services" class="hover:text-indigo-400">Services</a>
                <a href="http://vps.open-data.world:8000/chat" class="hover:text-indigo-400">Chat</a>
                <a href="http://vps.open-data.world:7860" class="hover:text-indigo-400">LangFlow</a>
            </div>
        </div>
    </nav>

    <section class="pt-40 pb-20 px-6 text-center">
        <h1 class="text-5xl font-bold mb-6">
            Build Intelligent<br>
            <span class="bg-gradient-to-r from-indigo-400 to-purple-400 bg-clip-text text-transparent">Data Applications</span>
        </h1>
        <p class="text-xl text-slate-300 mb-10 max-w-xl mx-auto">
            Open-source data platform with AI agent, LangFlow visual builder, and on-demand ML services.
        </p>
        <div class="flex gap-4 justify-center">
            <a href="http://vps.open-data.world:8000/chat.html" class="px-6 py-3 bg-indigo-600 rounded-lg hover:bg-indigo-700">Try AI Chat</a>
            <a href="http://vps.open-data.world:7860" class="px-6 py-3 bg-white/10 rounded-lg hover:bg-white/20">LangFlow</a>
        </div>
    </section>

    <section id="services" class="py-16 px-6">
        <div class="max-w-4xl mx-auto">
            <div class="grid grid-cols-4 gap-4">
                <div class="bg-white/5 p-4 rounded-lg text-center">
                    <div class="text-2xl mb-2">🐘</div>
                    <div class="text-sm">PostgreSQL</div>
                </div>
                <div class="bg-white/5 p-4 rounded-lg text-center">
                    <div class="text-2xl mb-2">🔴</div>
                    <div class="text-sm">Redis</div>
                </div>
                <div class="bg-white/5 p-4 rounded-lg text-center">
                    <div class="text-2xl mb-2">🦙</div>
                    <div class="text-sm">Ollama</div>
                </div>
                <div class="bg-white/5 p-4 rounded-lg text-center">
                    <div class="text-2xl mb-2">🧠</div>
                    <div class="text-sm">SurrealDB</div>
                </div>
            </div>
        </div>
    </section>
</body>
</html>
