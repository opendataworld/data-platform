<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<title>opendataworld — control</title>
<style>
  body { font-family: system-ui, sans-serif; max-width: 640px; margin: 3rem auto; padding: 0 1rem; color: #222; }
  h1 { font-size: 1.25rem; margin-bottom: 0.25rem; }
  .hint { color: #666; font-size: 0.9rem; margin-bottom: 2rem; }
  button { font-size: 1rem; padding: 0.75rem 1.5rem; margin-right: 0.75rem; border: 1px solid #ccc; border-radius: 6px; cursor: pointer; background: #fff; }
  button.deploy { background: #0b6; color: #fff; border-color: #094; }
  button.stop   { background: #d33; color: #fff; border-color: #a22; }
  button:disabled { opacity: 0.5; cursor: wait; }
  pre { background: #f4f4f4; padding: 1rem; border-radius: 6px; overflow: auto; font-size: 0.85rem; white-space: pre-wrap; }
  .row { margin-bottom: 1.5rem; }
</style>
</head>
<body>
<h1>opendataworld — control</h1>
<p class="hint">Local-only control surface. <code>/deploy</code> runs <code>docker compose up -d --pull always</code>. <code>/stop</code> runs <code>docker compose down</code>.</p>

<div class="row">
  <button class="deploy" id="deploy">Deploy</button>
  <button class="stop" id="stop">Stop</button>
  <button id="refresh">Refresh status</button>
</div>

<h2>Output</h2>
<pre id="output">(idle)</pre>

<script>
const out = document.getElementById("output");
async function call(path, button) {
  const btns = document.querySelectorAll("button");
  btns.forEach(b => b.disabled = true);
  out.textContent = `running ${path}...`;
  try {
    const r = await fetch(path, { method: path === "/status" ? "GET" : "POST" });
    const data = await r.json();
    out.textContent = JSON.stringify(data, null, 2);
  } catch (e) {
    out.textContent = `error: ${e}`;
  } finally {
    btns.forEach(b => b.disabled = false);
  }
}
document.getElementById("deploy").onclick  = () => call("/deploy");
document.getElementById("stop").onclick    = () => call("/stop");
document.getElementById("refresh").onclick = () => call("/status");
call("/status");
</script>
</body>
</html>
